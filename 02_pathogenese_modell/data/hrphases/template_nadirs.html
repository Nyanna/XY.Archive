<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>MHR10 Nadirs – {{NIGHT_DATE}}</title></head><body style="margin:0;padding:1rem;background:#fff;font-family:system-ui,sans-serif;">
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px;font-size:12px;color:#666;">
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(133,183,235,0.3);"></span>HR raw</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;"></span>MHR10</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:#D85A30;border:2px solid #993C1D;"></span>Nadir</span>
</div>
<div style="position:relative;width:100%;height:500px;">
  <canvas id="c1" role="img" aria-label="MHR10 with nadirs for {{NIGHT_DATE}}"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script>
const D = {{DATA_JSON}};
const isDk=matchMedia('(prefers-color-scheme:dark)').matches;
const gc=isDk?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
const tc=isDk?'#999':'#666';
const annots={};
D.nadir_indices.forEach((ni,j)=>{
  const below=(j%2===0);
  annots['l'+j]={type:'label',xValue:ni,yValue:D.m10[ni]+(below?-2.0:1.5),content:D.t[ni]+' ('+Math.round(D.m10[ni]*10)/10+')',font:{size:9},color:tc};
  annots['p'+j]={type:'point',xValue:ni,yValue:D.m10[ni],radius:5,backgroundColor:'#D85A30',borderColor:'#993C1D',borderWidth:1.5};
});
new Chart(document.getElementById('c1'),{
  type:'line',
  data:{labels:D.t,datasets:[
    {data:D.hr,borderColor:'rgba(133,183,235,0.25)',borderWidth:1,pointRadius:0,fill:false,order:2},
    {data:D.m10,borderColor:'#378ADD',borderWidth:2,pointRadius:0,fill:false,order:1},
  ]},
  options:{
    responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},annotation:{annotations:annots}},
    scales:{
      y:{min:D.y_min,max:D.y_max,ticks:{color:tc,stepSize:5},grid:{color:gc},title:{display:true,text:'MHR10 (bpm)',color:tc}},
      x:{ticks:{color:tc,autoSkip:true,maxTicksLimit:25},grid:{color:gc}}
    }
  }
});
</script>
</body></html>
