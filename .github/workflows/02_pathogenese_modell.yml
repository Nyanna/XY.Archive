name: Build Pathogenese-Modell

on:
  workflow_dispatch:
  push:
    paths:
      - '02_pathogenese_modell/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build script
        run: bash 02_pathogenese_modell/build.sh

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "build: regenerate combined model output"
          git push
